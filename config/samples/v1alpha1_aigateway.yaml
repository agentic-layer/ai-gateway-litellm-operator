apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: AiGateway
metadata:
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/managed-by: kustomize
  name: ai-gateway
spec:
  aiGatewayClassName: litellm
  aiModels:
    - provider: openai
      name: gpt-3.5-turbo
  # Route the OpenAI provider to the local WireMock mock LLM server.
  # Apply config/samples/wiremock/ first, then this file, for a fully working local setup.
  env:
    - name: OPENAI_API_BASE
      value: http://wiremock:8080
    - name: OPENAI_API_KEY
      value: test-key
  # Optional: configure additional environment variables
  # env:
  #   # Configure OpenTelemetry endpoint for distributed tracing
  #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
  #     value: http://otel-collector:4318
  #   - name: OTEL_EXPORTER_OTLP_PROTOCOL
  #     value: http/json
  # Optional: Load environment variables from ConfigMaps or Secrets
  # envFrom:
  #   - configMapRef:
  #       name: litellm-config
  #   - secretRef:
  #       name: litellm-secrets
