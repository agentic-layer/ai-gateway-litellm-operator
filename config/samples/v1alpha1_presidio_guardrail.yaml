# Example: Presidio PII masking guardrail setup for an AiGateway
#
# This sample demonstrates how to configure a Presidio-based PII guardrail.
# Presidio requires the Analyzer and Anonymizer services to be running.
# See https://microsoft.github.io/presidio/ for deployment instructions.
#
# The GuardrailProvider.spec.presidio.baseUrl is used for both the Presidio
# Analyzer and Anonymizer endpoints in the generated LiteLLM config.
---
# GuardrailProvider references the Presidio backend service.
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: GuardrailProvider
metadata:
  name: presidio
  namespace: default
spec:
  type: presidio-api
  presidio:
    baseUrl: "http://presidio-service.default.svc.cluster.local:80"
---
# Guard defines when the guardrail is applied and references the provider.
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Guard
metadata:
  name: pii-masking
  namespace: default
spec:
  mode:
    - pre_call
  description: Detect and mask PII in user inputs before they are sent to the LLM.
  providerRef:
    name: presidio
    namespace: default
---
# AiGateway references the Guard to activate it for all requests.
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: AiGateway
metadata:
  labels:
    app.kubernetes.io/name: my-litellm
    app.kubernetes.io/managed-by: kustomize
  name: my-litellm
  namespace: default
spec:
  aiGatewayClassName: litellm
  aiModels:
    - provider: openai
      name: gpt-3.5-turbo
  guardrails:
    - name: pii-masking
      namespace: default
