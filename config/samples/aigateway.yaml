apiVersion: v1
kind: Namespace
metadata:
  name: ai-gateway
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: AiGateway
metadata:
  name: ai-gateway
  namespace: ai-gateway
spec:
  aiGatewayClassName: litellm
  aiModels:
    - provider: openai
      name: gpt-3.5-turbo
  # Route the OpenAI provider to the local WireMock mock LLM server (config/samples/backends).
  env:
    - name: OPENAI_API_BASE
      value: http://wiremock.default:8080
    - name: OPENAI_API_KEY
      value: test-key
  # Optional: configure additional environment variables
  # env:
  #   # Configure OpenTelemetry endpoint for distributed tracing
  #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
  #     value: http://otel-collector:4318
  #   - name: OTEL_EXPORTER_OTLP_PROTOCOL
  #     value: http/json
  # Optional: Load environment variables from ConfigMaps or Secrets
  # envFrom:
  #   - configMapRef:
  #       name: litellm-config
  #   - secretRef:
  #       name: litellm-secrets
