apiVersion: v1
kind: Namespace
metadata:
  name: tool-gateway
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolGateway
metadata:
  labels:
    app.kubernetes.io/name: tool-gateway
    app.kubernetes.io/managed-by: kustomize
  name: tool-gateway
  namespace: tool-gateway
spec:
  toolGatewayClassName: litellm
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolServer
metadata:
  name: echo
  namespace: default
spec:
  protocol: mcp
  transportType: http
  image: ghcr.io/agentic-layer/echo-mcp-server:0.3.0
  port: 8000
  path: /mcp
---
# Hand-rolled Deployment for the MCP server. In production, the
# agent-runtime-operator would create this from the ToolServer above.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: default
  labels:
    app: echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          image: ghcr.io/agentic-layer/echo-mcp-server:0.3.0
          ports:
            - containerPort: 8000
              name: mcp
          env:
            - name: ECHO_TOOL_NAME
              value: "echo_message"
            - name: ECHO_TOOL_RESPONSE
              value: "hello from e2e"
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: default
spec:
  selector:
    app: echo
  ports:
    - name: mcp
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolRoute
metadata:
  name: echo
  namespace: default
spec:
  # No toolGatewayRef on purpose — the route binds to the gateway in the
  # well-known "tool-gateway" namespace.
  upstream:
    toolServerRef:
      name: echo
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolGateway
metadata:
  name: tool-gateway-guarded
  namespace: tool-gateway
spec:
  toolGatewayClassName: litellm
  guardrails:
    - name: pii-guard
      namespace: guards
