# WireMock mock LLM provider for local and e2e testing.
# Implements OpenAI-compatible /chat/completions and /v1/models endpoints
# so LiteLLM can be pointed at it without a real API key or internet access.
#
# Usage:
#   kubectl apply -f config/samples/wiremock/
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wiremock-stubs
data:
  # Stub: POST /chat/completions
  chat-completion.json: |
    {
      "request": {
        "method": "POST",
        "url": "/chat/completions"
      },
      "response": {
        "status": 200,
        "headers": {
          "Content-Type": "application/json"
        },
        "jsonBody": {
          "id": "chatcmpl-wiremock-001",
          "object": "chat.completion",
          "created": 1699000000,
          "model": "gpt-3.5-turbo",
          "choices": [
            {
              "index": 0,
              "message": {
                "role": "assistant",
                "content": "I am a mock AI response from WireMock."
              },
              "finish_reason": "stop",
              "logprobs": null
            }
          ],
          "usage": {
            "prompt_tokens": 10,
            "completion_tokens": 10,
            "total_tokens": 20
          },
          "system_fingerprint": null
        }
      }
    }
  # Stub: GET /v1/models
  models.json: |
    {
      "request": {
        "method": "GET",
        "url": "/v1/models"
      },
      "response": {
        "status": 200,
        "headers": {
          "Content-Type": "application/json"
        },
        "jsonBody": {
          "object": "list",
          "data": [
            {
              "id": "gpt-3.5-turbo",
              "object": "model",
              "created": 1677858242,
              "owned_by": "wiremock"
            }
          ]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiremock
  labels:
    app: wiremock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wiremock
  template:
    metadata:
      labels:
        app: wiremock
    spec:
      containers:
        - name: wiremock
          image: wiremock/wiremock:3.10.0
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: stubs
              mountPath: /home/wiremock/mappings
              readOnly: true
          readinessProbe:
            httpGet:
              path: /__admin/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /__admin/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: stubs
          configMap:
            name: wiremock-stubs
---
apiVersion: v1
kind: Service
metadata:
  name: wiremock
  labels:
    app: wiremock
spec:
  selector:
    app: wiremock
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
