# Demonstrates the LiteLLM config-patch escape hatch on a ToolGateway. The
# patch ConfigMap adds auth headers to the mcp_servers entry generated by the
# echo ToolRoute (operator-supplied url and transport are preserved) and also
# layers a general_settings.master_key. The master_key is an illustration AND
# the fixture our E2E test asserts against — replace it before production use.
apiVersion: v1
kind: Namespace
metadata:
  name: tool-gateway-patched
---
apiVersion: v1
kind: Namespace
metadata:
  name: tool-gateway-patched-routes
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tool-gateway-patch
  namespace: tool-gateway-patched
data:
  # MCP_TOKEN must be supplied at runtime via spec.env or spec.envFrom on the
  # ToolGateway — LiteLLM resolves the os.environ/<name> placeholder lazily,
  # so the gateway will start without it but auth-forwarded requests will
  # fail until the env var is set.
  patch.yaml: |
    mcp_servers:
      tool-gateway-patched-routes__echo:
        auth_type: oauth2
        headers:
          Authorization: os.environ/MCP_TOKEN
    general_settings:
      master_key: sk-sample-tool-1234
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolGateway
metadata:
  name: tool-gateway
  namespace: tool-gateway-patched
  annotations:
    ai-gateway-litellm.agentic-layer.ai/config-patch: tool-gateway-patch
spec:
  toolGatewayClassName: litellm
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolRoute
metadata:
  name: echo
  namespace: tool-gateway-patched-routes
spec:
  toolGatewayRef:
    name: tool-gateway
    namespace: tool-gateway-patched
  upstream:
    external:
      url: http://echo.default/mcp
