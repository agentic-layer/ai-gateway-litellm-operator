# Demonstrates the LiteLLM config-patch escape hatch on an AiGateway. The
# patch ConfigMap layers a router_settings block (an unmodeled top-level key)
# onto the operator-generated config without a typed CRD change.
apiVersion: v1
kind: Namespace
metadata:
  name: ai-gateway-patched
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-gateway-patch
  namespace: ai-gateway-patched
data:
  patch.yaml: |
    router_settings:
      routing_strategy: usage-based-routing-v2
    litellm_settings:
      drop_params: true
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: AiGateway
metadata:
  name: ai-gateway
  namespace: ai-gateway-patched
  annotations:
    ai-gateway-litellm.agentic-layer.ai/config-patch: ai-gateway-patch
spec:
  aiGatewayClassName: litellm
  aiModels:
    - provider: openai
      name: gpt-3.5-turbo
  env:
    - name: OPENAI_API_BASE
      value: http://wiremock.default:8080
    - name: OPENAI_API_KEY
      value: test-key
