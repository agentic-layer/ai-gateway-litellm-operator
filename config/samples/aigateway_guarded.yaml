# Example: Presidio PII masking guardrail setup for an AiGateway.
#
# This sample demonstrates how to configure a Presidio-based PII guardrail
# with cross-namespace references. The GuardrailProvider, Guard, and AiGateway
# each live in separate namespaces to verify cross-namespace resolution.
#
# The GuardrailProvider.spec.presidio.baseUrl points at the shared Presidio
# backend deployed by config/samples/backends, which lives in its own
# namespace and is referenced cross-namespace.
---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-gateway-guarded-providers
---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-gateway-guarded-guards
---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-gateway-guarded
---
# GuardrailProvider references the shared Presidio backend service.
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: GuardrailProvider
metadata:
  name: presidio
  namespace: ai-gateway-guarded-providers
spec:
  type: presidio-api
  presidio:
    baseUrl: "http://presidio.guardrail-providers:80"
---
# Guard defines when the guardrail is applied and references the provider.
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Guard
metadata:
  name: pii-guard
  namespace: ai-gateway-guarded-guards
spec:
  mode:
    - pre_call
  description: Detect and mask PII in user inputs before they are sent to the LLM.
  providerRef:
    name: presidio
    namespace: ai-gateway-guarded-providers
  presidio:
    language: en
    scoreThresholds:
      ALL: "0.5"
    entityActions:
      PHONE_NUMBER: MASK
      EMAIL_ADDRESS: MASK
      CREDIT_CARD: MASK
      PERSON: MASK
---
# AiGateway with Presidio guardrail enabled.
# Routes to the WireMock mock LLM (apply config/samples/backends first).
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: AiGateway
metadata:
  name: ai-gateway-pii
  namespace: ai-gateway-guarded
spec:
  aiGatewayClassName: litellm
  aiModels:
    - provider: openai
      name: gpt-3.5-turbo
  env:
    - name: OPENAI_API_BASE
      value: http://wiremock.default:8080
    - name: OPENAI_API_KEY
      value: test-key
  guardrails:
    - name: pii-guard
      namespace: ai-gateway-guarded-guards
