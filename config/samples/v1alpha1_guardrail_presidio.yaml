# Example: Presidio PII masking guardrail setup for an AiGateway.
#
# This sample demonstrates how to configure a Presidio-based PII guardrail
# with cross-namespace references. The GuardrailProvider, Guard, and AiGateway
# each live in separate namespaces to verify cross-namespace resolution:
#   - GuardrailProvider + Presidio services: "guardrail-providers" namespace
#   - Guard: "guards" namespace
#   - AiGateway: "default" namespace
#
# The GuardrailProvider.spec.presidio.baseUrl uses a cross-namespace DNS name
# so that LiteLLM (running in the AiGateway's namespace) can reach Presidio.
---
apiVersion: v1
kind: Namespace
metadata:
  name: guardrail-providers
---
apiVersion: v1
kind: Namespace
metadata:
  name: guards
---
# GuardrailProvider references the Presidio backend service.
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: GuardrailProvider
metadata:
  name: presidio
  namespace: guardrail-providers
spec:
  type: presidio-api
  presidio:
    baseUrl: "http://presidio.guardrail-providers:80"
---
# Guard defines when the guardrail is applied and references the provider.
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Guard
metadata:
  name: pii-guard
  namespace: guards
spec:
  mode:
    - pre_call
  description: Detect and mask PII in user inputs before they are sent to the LLM.
  providerRef:
    name: presidio
    namespace: guardrail-providers
  presidio:
    language: en
    scoreThresholds:
      ALL: "0.5"
    entityActions:
      PHONE_NUMBER: MASK
      EMAIL_ADDRESS: MASK
      CREDIT_CARD: MASK
      PERSON: MASK
---
# AiGateway with Presidio guardrail enabled.
# Routes to the WireMock mock LLM (apply wiremock/wiremock.yaml first).
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: AiGateway
metadata:
  name: ai-gateway-pii
  namespace: default
spec:
  aiGatewayClassName: litellm
  aiModels:
    - provider: openai
      name: gpt-3.5-turbo
  env:
    - name: OPENAI_API_BASE
      value: http://wiremock:8080
    - name: OPENAI_API_KEY
      value: test-key
  guardrails:
    - name: pii-guard
      namespace: guards
