# Presidio PII detection services for local and e2e testing.
# Deploys Presidio Analyzer and Anonymizer, plus an nginx reverse proxy that
# exposes both services under a single URL (presidio-service:80).
# This is required because the GuardrailProvider CRD uses a single baseUrl
# which is mapped to both presidio_analyzer_api_base and presidio_anonymizer_api_base.
#
# Routes:
#   POST presidio-service:80/analyze   -> presidio-analyzer:3000
#   POST presidio-service:80/anonymize -> presidio-anonymizer:3000
---
# Nginx reverse-proxy config
apiVersion: v1
kind: ConfigMap
metadata:
  name: presidio-proxy-config
  namespace: default
data:
  default.conf: |
    server {
        listen 80;
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
        location /analyze {
            proxy_pass http://presidio-analyzer:3000;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }
        location /anonymize {
            proxy_pass http://presidio-anonymizer:3000;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
        }
    }
---
# Presidio Analyzer Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-analyzer
  namespace: default
  labels:
    app: presidio-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presidio-analyzer
  template:
    metadata:
      labels:
        app: presidio-analyzer
    spec:
      containers:
        - name: presidio-analyzer
          image: mcr.microsoft.com/presidio-analyzer:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
# Presidio Analyzer Service
apiVersion: v1
kind: Service
metadata:
  name: presidio-analyzer
  namespace: default
spec:
  selector:
    app: presidio-analyzer
  ports:
    - port: 3000
      targetPort: 3000
---
# Presidio Anonymizer Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-anonymizer
  namespace: default
  labels:
    app: presidio-anonymizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presidio-anonymizer
  template:
    metadata:
      labels:
        app: presidio-anonymizer
    spec:
      containers:
        - name: presidio-anonymizer
          image: mcr.microsoft.com/presidio-anonymizer:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
# Presidio Anonymizer Service
apiVersion: v1
kind: Service
metadata:
  name: presidio-anonymizer
  namespace: default
spec:
  selector:
    app: presidio-anonymizer
  ports:
    - port: 3000
      targetPort: 3000
---
# Nginx reverse-proxy Deployment (routes /analyze and /anonymize to the respective services)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-proxy
  namespace: default
  labels:
    app: presidio-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presidio-proxy
  template:
    metadata:
      labels:
        app: presidio-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: presidio-proxy-config
---
# Presidio Service — the single URL exposed to LiteLLM via GuardrailProvider.spec.presidio.baseUrl
apiVersion: v1
kind: Service
metadata:
  name: presidio-service
  namespace: default
spec:
  selector:
    app: presidio-proxy
  ports:
    - port: 80
      targetPort: 80
